schema: spec-driven

context: |
  Project: Paperland - 论文管理网站
  Tech stack: TypeScript, Vue 3 + Vite (frontend), Fastify (backend), Drizzle ORM, SQLite, Bun
  Monorepo: packages/frontend, packages/backend, packages/shared
  Naming: snake_case for all API keys, DB fields, JSON responses
  Config: config.yml (unified site-wide config)
  Services: services/ directory with unit tests, paper-bound services use depends_on/produces dependency graph
  Auth: HTTP Basic Auth (website) + Bearer Token (External API)
  See docs/ for detailed architecture: frontend-architecture.md, external-api.md, tech-stack.md

rules:
  tasks:
    - Reference docs/ architecture documents for implementation details
    - Some unit tests call real external services (arxiv, semantic scholar, OpenAI) and may incur costs - do not run all tests blindly
