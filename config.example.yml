database:
  type: sqlite
  path: ./data/paperland.db
  backup:
    enabled: true
    dir: ./data/backups
    retention_days: 30

allowed_hosts:
  - .dev.mem.ac

auth:
  enabled: true
  users:
    - username: admin
      password: changeme

services:
  arxiv:
    max_concurrency: 3
    rate_limit_interval: 3
  semantic_scholar:
    max_concurrency: 5
    rate_limit_interval: 1
  pdf_parse:
    max_concurrency: 2
    method: nodejs
  papers_cool:
    max_concurrency: 1
    rate_limit_interval: 5
  qa:
    max_concurrency: 2

models:
  default: gpt-4o
  available:
    - name: gpt-4o
      type: openai_api
      endpoint: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
    # - name: codex-gpt-5.4
    #   type: codex
    #   shell: 'codex exec --skip-git-repo-check --model "gpt-5.4"'
    #   timeout: 600

content_priority:
  - user_input
  - pdf_parsed

system_prompt: |
  【paperland】请根据下面的论文内容回答这个问题：{PROMPT}

  ---

  {PAPER}


qa:
  - name: research-question
    prompt: "这篇论文试图解决什么问题？"
  - name: related-works
    prompt: "有哪些相关工作与前置知识？"
  - name: insights
    prompt: "作者有哪些重要的观察、灵感或发现，从而促使其提出了该研究问题或解决方法？"
  - name: method
    prompt: "论文如何解决所提出的研究问题？"
  - name: experiments
    prompt: "论文做了哪些实验？是怎么通过这些实验进行问题分析或论证方法有效性的？"
  - name: conclusion
    prompt: "作者所作出的结论是什么？"
  - name: discussion
    prompt: "作者还提出了哪些值得讨论的问题？针对每个一个问题，是怎么进行分析和实验的？"
  - name: future-works
    prompt: "有哪些可以进一步探索的点？"
  - name: summary
    prompt: "帮我总结一下论文的主要内容，并在最后给出一句话总结"
