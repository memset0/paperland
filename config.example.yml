database:
  type: sqlite
  path: ./data/paperland.db
  backup:
    enabled: true
    dir: ./data/backups
    retention_days: 30

# Optional: restrict allowed hosts (for CORS)
# allowed_hosts:
#   - localhost

auth:
  enabled: false
  users:
    - username: admin
      password: changeme

services:
  arxiv:
    max_concurrency: 3
    rate_limit_interval: 3
  semantic_scholar:
    max_concurrency: 5
    rate_limit_interval: 1
  pdf_parse:
    max_concurrency: 2
    method: nodejs
  papers_cool:
    max_concurrency: 1
    rate_limit_interval: 5
  qa:
    max_concurrency: 2

models:
  default: gpt-4o
  available:
    - name: gpt-4o
      type: openai_api
      endpoint: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
    # - name: codex-gpt-5.4
    #   type: codex
    #   shell: 'codex exec --skip-git-repo-check --model "gpt-5.4"'
    #   timeout: 600

content_priority:
  - user_input
  - pdf_parsed

system_prompt: |
  Answer the following question based on the paper content: {PROMPT}

  ---

  {PAPER}

qa:
  - name: research-question
    prompt: "What problem does this paper try to solve?"
  - name: related-works
    prompt: "What are the related works and prerequisite knowledge?"
  - name: method
    prompt: "How does the paper solve the proposed research problem?"
  - name: experiments
    prompt: "What experiments does the paper conduct? How do they validate the claims?"
  - name: conclusion
    prompt: "What are the main conclusions?"
  - name: summary
    prompt: "Summarize the main content of this paper and give a one-sentence takeaway."
