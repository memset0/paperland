database:
  type: sqlite
  path: ./data/paperland.db
  backup:
    enabled: true
    dir: ./data/backups
    retention_days: 30

auth:
  users:
    - username: admin
      password: changeme

services:
  arxiv:
    max_concurrency: 3
    rate_limit_interval: 3
  semantic_scholar:
    max_concurrency: 5
    rate_limit_interval: 1
  pdf_parse:
    max_concurrency: 2
    method: nodejs
  qa:
    max_concurrency: 2

models:
  default: gpt-4o
  available:
    - name: gpt-4o
      type: openai_api
      endpoint: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY

content_priority:
  - user_input
  - alphaxiv
  - pdf_parsed

system_prompt: |
  请根据以下论文内容回答问题。

  论文内容：
  {PAPER}

  问题：
  {PROMPT}

qa:
  - name: abstract
    prompt: "用中文总结这篇论文的核心内容和主要贡献（200-300字）。"
  - name: method
    prompt: "用中文详细描述这篇论文提出的方法和技术方案（200-400字）。"
  - name: experiment
    prompt: "用中文总结这篇论文的实验设计、数据集和实验结果（200-400字）。"
